services:
  - type: web
    name: mindvault-licence
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_SECRET
        generateValue: true   # Render 自动生成随机值
      - key: DB_PATH
        value: /data/licences.db
    disk:
      name: licence-db
      mountPath: /data
      sizeGB: 1
